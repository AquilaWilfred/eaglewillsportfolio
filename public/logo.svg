<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 820 220" width="820" height="220">
  <defs>

    <!-- 3D Navy Blue gradient for X -->
    <linearGradient id="navyTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8CCA;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1B3A72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1C40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navySide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1C40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#051030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navyBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061228;stop-opacity:1" />
    </linearGradient>

    <!-- 3D Black gradient for Cogni -->
    <linearGradient id="blackTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666666;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#222222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blackSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>

    <!-- 3D Purple gradient for Vis -->
    <linearGradient id="purpleTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#7B2FBE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A0E8F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A1E9A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#380B70;stop-opacity:1" />
    </linearGradient>

    <!-- 3D Normal Blue gradient for .com -->
    <linearGradient id="blueTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A8F8;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1040B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A4FCC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E2F8A;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for 3D depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Drop shadow for overall logo -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

  </defs>

  <!-- Overall shadow layer -->
  <g filter="url(#shadow)">

  <!-- ═══════════════ X LETTER — NAVY BLUE 3D ═══════════════ -->
  <!-- 3D depth layers (bottom-right offset) -->
  <!-- Right side face of X top-left bar -->
  <polygon points="28,165 38,155 68,105 58,95" fill="url(#navySide)" opacity="0.85"/>
  <!-- Right side face of X bottom-left bar -->
  <polygon points="28,45 38,55 68,105 58,115" fill="url(#navySide)" opacity="0.85"/>
  <!-- Right side face of X top-right bar -->
  <polygon points="118,45 128,55 98,105 88,95" fill="url(#navySide)" opacity="0.85"/>
  <!-- Right side face of X bottom-right bar -->
  <polygon points="118,165 128,155 98,105 88,115" fill="url(#navySide)" opacity="0.85"/>

  <!-- Bottom face -->
  <polygon points="18,165 28,165 58,115 48,115" fill="url(#navyBottom)" opacity="0.7"/>
  <polygon points="18,45 28,45 58,95 48,95" fill="url(#navyBottom)" opacity="0.7"/>
  <polygon points="128,45 118,45 88,95 98,95" fill="url(#navyBottom)" opacity="0.7"/>
  <polygon points="128,165 118,165 88,115 98,115" fill="url(#navyBottom)" opacity="0.7"/>

  <!-- Main X front face — top-left to bottom-right bar -->
  <polygon points="18,45 48,45 88,105 48,165 18,165 58,105" fill="url(#navyTop)"/>
  <!-- Main X front face — top-right to bottom-left bar -->
  <polygon points="118,45 88,45 48,105 88,165 118,165 78,105" fill="url(#navyTop)"/>

  <!-- Shine on X -->
  <polygon points="18,45 48,45 88,105 48,165 18,165 58,105" fill="url(#shine)"/>
  <polygon points="118,45 88,45 48,105 88,165 118,165 78,105" fill="url(#shine)"/>

  <!-- Dash between X and Cogni -->
  <!-- 3D dash depth -->
  <rect x="138" y="98" width="24" height="14" rx="2" fill="url(#navySide)" opacity="0.8"/>
  <rect x="136" y="95" width="24" height="14" rx="2" fill="url(#navyTop)"/>
  <rect x="136" y="95" width="24" height="14" rx="2" fill="url(#shine)"/>

  <!-- ═══════════════ COGNI LETTERS — BLACK 3D ═══════════════ -->
  <!-- Using text with 3D extrusion effect -->
  <!-- Extrusion layers (dark offset) -->
  <text x="170" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#111111" opacity="0.6" transform="translate(7,7)">Cogni</text>
  <text x="170" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#1a1a1a" opacity="0.7" transform="translate(5,5)">Cogni</text>
  <text x="170" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#222222" opacity="0.8" transform="translate(3,3)">Cogni</text>
  <!-- Main Cogni -->
  <text x="170" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="url(#blackTop)">Cogni</text>
  <!-- Shine overlay via clipping -->
  <text x="170" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="url(#shine)" opacity="0.5">Cogni</text>

  <!-- ═══════════════ VIS LETTERS — PURPLE 3D ═══════════════ -->
  <!-- Extrusion layers -->
  <text x="507" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#2d0660" opacity="0.6" transform="translate(7,7)">Vis</text>
  <text x="507" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#3d0880" opacity="0.7" transform="translate(5,5)">Vis</text>
  <text x="507" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="#5a0fab" opacity="0.8" transform="translate(3,3)">Vis</text>
  <!-- Main Vis -->
  <text x="507" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="url(#purpleTop)">Vis</text>
  <text x="507" y="155" font-family="'Georgia', 'Times New Roman', serif" font-size="108" font-weight="bold" font-style="italic" fill="url(#shine)" opacity="0.5">Vis</text>

  <!-- ═══════════════ .com — NORMAL BLUE 3D ═══════════════ -->
  <!-- Extrusion layers -->
  <text x="617" y="160" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#0a2060" opacity="0.6" transform="translate(5,5)">.com</text>
  <text x="617" y="160" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#102870" opacity="0.75" transform="translate(3,3)">.com</text>
  <!-- Main .com -->
  <text x="617" y="160" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#blueTop)">.com</text>
  <text x="617" y="160" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#shine)" opacity="0.5">.com</text>

  </g>

  <!-- Decorative accent line under logo -->
  <rect x="18" y="178" width="790" height="3" rx="1.5" fill="url(#navyTop)" opacity="0.15"/>

</svg>
